<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
 
/*
 * FIREBASE CONFIG
 * Stored in localStorage after first setup.
 * Format: { apiKey, databaseURL }
 */
const FB_STORAGE_KEY = "zwemschema-firebase-config";
 
function getStoredConfig() {
  try {
    const raw = localStorage.getItem(FB_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}
 
function storeConfig(cfg) {
  localStorage.setItem(FB_STORAGE_KEY, JSON.stringify(cfg));
}
 
/*
 * Minimal Firebase REST wrapper — no SDK needed
 * Uses Firebase Realtime Database REST API
 */
function firebaseREST(databaseURL) {
  const base = databaseURL.replace(/\/$/, "");
  return {
    async get(path) {
      const r = await fetch(base + "/" + path + ".json");
      if (!r.ok) throw new Error("Firebase GET failed: " + r.status);
      return r.json();
    },
    async set(path, data) {
      const r = await fetch(base + "/" + path + ".json", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!r.ok) throw new Error("Firebase PUT failed: " + r.status);
      return r.json();
    },
    listen(path, callback) {
      const es = new EventSource(base + "/" + path + ".json");
      es.addEventListener("put", (e) => {
        try {
          const parsed = JSON.parse(e.data);
          callback(parsed.data);
        } catch {}
      });
      es.addEventListener("patch", (e) => {
        try {
          const parsed = JSON.parse(e.data);
          callback(parsed.data, true);
        } catch {}
      });
      es.onerror = () => {};
      return () => es.close();
    }
  };
}
 
 
/* ========== SETUP SCREEN ========== */
function SetupScreen({ onComplete }) {
  const [dbURL, setDbURL] = useState("");
  const [error, setError] = useState("");
  const [testing, setTesting] = useState(false);
 
  async function handleConnect() {
    setError("");
    const url = dbURL.trim().replace(/\/$/, "");
    if (!url.includes("firebasedatabase.app") && !url.includes("firebaseio.com")) {
      setError("Dit lijkt geen geldige Firebase database URL. Het moet eindigen op .firebaseio.com of .firebasedatabase.app");
      return;
    }
    setTesting(true);
    try {
      const fb = firebaseREST(url);
      await fb.set("_test", { t: Date.now() });
      const check = await fb.get("_test");
      if (!check || !check.t) throw new Error("Read-back failed");
      storeConfig({ databaseURL: url });
      onComplete({ databaseURL: url });
    } catch (err) {
      setError("Kan niet verbinden. Check of de URL klopt en of de database rules op 'test mode' staan. Fout: " + err.message);
    }
    setTesting(false);
  }
 
  return (
    <div className="setup-box">
      <h1>Firebase koppelen</h1>
      <p>Om je vinkjes te synchroniseren tussen apparaten heb je een (gratis) Firebase database nodig. Eenmalig instellen, daarna werkt het automatisch.</p>
 
      <ol>
        <li>Ga naar <strong><a href="https://console.firebase.google.com/" target="_blank" rel="noopener">console.firebase.google.com</a></strong> en log in met je Google account</li>
        <li>Klik <strong>Add project</strong> (of "Project toevoegen"), noem het bijv. "zwemschema", klik door (Analytics mag uit)</li>
        <li>In je project, klik links op <strong>Build → Realtime Database</strong></li>
        <li>Klik <strong>Create Database</strong>, kies een locatie (europe-west1 is prima), en kies <strong>Start in test mode</strong></li>
        <li>Kopieer de database URL bovenaan (ziet er uit als <code>https://zwemschema-xxxxx-default-rtdb.europe-west1.firebasedatabase.app</code>)</li>
        <li>Plak die URL hieronder:</li>
      </ol>
 
      <input
        type="url"
        placeholder="https://jouw-project-default-rtdb.europe-west1.firebasedatabase.app"
        value={dbURL}
        onChange={e => setDbURL(e.target.value)}
      />
 
      {error && <p style={{ color: "#E24B4A", fontSize: 13, marginBottom: 10 }}>{error}</p>}
 
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button className="btn" onClick={handleConnect} disabled={testing}>
          {testing ? "Verbinden..." : "Verbinden"}
        </button>
        <button className="btn-skip" onClick={() => onComplete(null)}>
          Zonder sync (alleen lokaal)
        </button>
      </div>
    </div>
  );
}

      <div style={{background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",borderRadius:12,padding:"16px 20px",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <span style={{fontWeight:500,fontSize:15,minWidth:60}}>Week {wk}</span>
          <span style={{fontSize:13,color:"var(--color-text-secondary)",background:"var(--color-background-secondary)",padding:"2px 10px",borderRadius:8}}>{getWeekDate(wk)}</span>
          {isTest&&<span style={{fontSize:11,fontWeight:500,color:"#993C1D",background:"#FAECE7",padding:"2px 10px",borderRadius:8}}>T{Math.floor((wk-1)/4)} test</span>}
          <span style={{fontSize:12,color:"var(--color-text-secondary)",marginLeft:"auto"}}>Totaal: {weekData.a.total+weekData.b.total}m</span>
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <TrainingCard label="Training A" training={weekData.a} color={color} checked={checks[wk+"a"]||false} onCheck={()=>toggle(wk+"a")}/>
          <TrainingCard label="Training B" training={weekData.b} color={color} checked={checks[wk+"b"]||false} onCheck={()=>toggle(wk+"b")}/>
        </div>
      </div>
    </div>
  );
}
 
 
/* ========== MAIN APP ========== */
function Schedule({ fbConfig }) {
  const [checks, setChecks] = useState({});
  const [filter, setFilter] = useState(0);
  const [syncStatus, setSyncStatus] = useState(fbConfig ? "wait" : "off");
  const fbRef = useRef(null);
  const cleanupRef = useRef(null);
 
  useEffect(() => {
    // Load from localStorage first (instant)
    try {
      const local = JSON.parse(localStorage.getItem("swim-checks") || "{}");
      setChecks(local);
    } catch {}
 
    if (!fbConfig) { setSyncStatus("off"); return; }
 
    const fb = firebaseREST(fbConfig.databaseURL);
    fbRef.current = fb;
 
    // Load from Firebase
    fb.get("checks").then(data => {
      if (data) {
        setChecks(prev => {
          const merged = { ...prev, ...data };
          localStorage.setItem("swim-checks", JSON.stringify(merged));
          return merged;
        });
      }
      setSyncStatus("ok");
    }).catch(() => setSyncStatus("off"));
 
    // Listen for realtime changes
    try {
      const unsub = fb.listen("checks", (data, isPatch) => {
        if (data !== null) {
          setChecks(prev => {
            const updated = isPatch ? { ...prev, ...data } : (data || {});
            localStorage.setItem("swim-checks", JSON.stringify(updated));
            return updated;
          });
          setSyncStatus("ok");
        }
      });
      cleanupRef.current = unsub;
    } catch {}
 
    return () => { if (cleanupRef.current) cleanupRef.current(); };
  }, [fbConfig]);
 
  const toggle = useCallback((key) => {
    setChecks(prev => {
      const next = { ...prev, [key]: !prev[key] };
      localStorage.setItem("swim-checks", JSON.stringify(next));
      if (fbRef.current) {
        fbRef.current.set("checks", next).then(() => setSyncStatus("ok")).catch(() => setSyncStatus("off"));
      }
      return next;
    });
  }, []);
 
  const totalDone = Object.values(checks).filter(Boolean).length;
  const filtered = filter===0 ? WEEKS : WEEKS.filter(w=>getBlockNum(w.week)===filter);
 
  return (
    <div style={{maxWidth:820,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:500}}>Zwemschema</h1>
          <p style={{fontSize:13,color:"var(--color-text-secondary)",marginTop:4}}>
            32 weken — 13 apr 2026 t/m 22 nov 2026
            <span style={{marginLeft:12}}>
              <span className={"sync-dot "+(syncStatus==="ok"?"ok":syncStatus==="wait"?"wait":"off")}></span>
              <span style={{fontSize:11}}>{syncStatus==="ok"?"Gesynchroniseerd":syncStatus==="wait"?"Verbinden...":"Alleen lokaal"}</span>
            </span>
          </p>
        </div>
        <div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 14px",fontSize:13,color:"var(--color-text-secondary)"}}>
          {totalDone}/{WEEKS.length*2} trainingen
          <div style={{height:4,background:"var(--color-border-tertiary)",borderRadius:2,marginTop:6,overflow:"hidden"}}>
            <div style={{width:(totalDone/(WEEKS.length*2)*100)+"%",height:"100%",background:"#0F6E56",borderRadius:2,transition:"width 0.3s"}}/>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:20,marginTop:12,flexWrap:"wrap"}}>
        {[{n:0,l:"Alle weken"},{n:1,l:"Blok 1"},{n:2,l:"Blok 2"},{n:3,l:"Blok 3"},{n:4,l:"Blok 4"},{n:5,l:"Blok 5"}].map(({n,l})=>(
          <button key={n} onClick={()=>setFilter(n)} style={{
            padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:500,
            border:filter===n?"1.5px solid "+(n===0?"var(--color-text-primary)":BLOCK_COLORS[n].accent):"1px solid var(--color-border-tertiary)",
            background:filter===n?(n===0?"var(--color-text-primary)":BLOCK_COLORS[n].bg):"transparent",
            color:filter===n?(n===0?"var(--color-background-primary)":BLOCK_COLORS[n].accent):"var(--color-text-secondary)",
          }}>{l}</button>
        ))}
      </div>
      {filtered.map(w=><WeekRow key={w.week} weekData={w} color={BLOCK_COLORS[getBlockNum(w.week)]} blockNum={getBlockNum(w.week)} checks={checks} toggle={toggle}/>)}
 
      <div style={{textAlign:"center",padding:"32px 0 16px",fontSize:12,color:"var(--color-text-secondary)"}}>
        <button onClick={()=>{localStorage.removeItem(FB_STORAGE_KEY);location.reload();}} style={{
          background:"transparent",border:"1px solid var(--color-border-tertiary)",borderRadius:8,
          padding:"6px 14px",fontSize:12,color:"var(--color-text-secondary)",cursor:"pointer"
        }}>Firebase-koppeling wijzigen</button>
      </div>
    </div>
  );
}
 
function App() {
  const [config, setConfig] = useState(undefined);
 
  useEffect(() => {
    const stored = getStoredConfig();
    setConfig(stored);
  }, []);
 
  if (config === undefined) return null;
 
  if (config === null) {
    return <SetupScreen onComplete={(cfg) => {
      if (cfg) storeConfig(cfg);
      setConfig(cfg || "local");
    }} />;
  }
 
  return <Schedule fbConfig={config === "local" ? null : config} />;
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
